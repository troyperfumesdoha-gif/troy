<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — TROY Perfumes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#000;color:#fff;font-family:'Poppins',sans-serif;overflow:hidden;}

  .bg{
    position:fixed;inset:0;
    background:radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0a0015 50%, #000 100%);
  }
  .stars{position:fixed;inset:0;overflow:hidden;}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out var(--del,0s) infinite alternate;}
  @keyframes twinkle{0%{opacity:.2;transform:scale(1);}100%{opacity:.8;transform:scale(1.4);}}

  .container{
    position:relative;z-index:10;
    height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:2rem;
  }

  .logo{
    font-size:clamp(1.2rem,4vw,1.8rem);font-weight:900;
    letter-spacing:.35em;text-transform:uppercase;
    color:#c9a84c;margin-bottom:3rem;
    text-shadow:0 0 40px rgba(201,168,76,.5);
  }

  .code{
    font-size:clamp(6rem,20vw,12rem);font-weight:900;
    line-height:1;letter-spacing:-.02em;
    background:linear-gradient(135deg,#c9a84c,#f5d78e,#c9a84c);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 60px rgba(201,168,76,.3));
    margin-bottom:1rem;
  }

  .title{
    font-size:clamp(1rem,3vw,1.5rem);font-weight:600;
    letter-spacing:.15em;text-transform:uppercase;
    color:rgba(255,255,255,.7);margin-bottom:.8rem;
  }

  .sub{
    font-size:clamp(.78rem,2vw,1rem);font-weight:300;
    color:rgba(255,255,255,.4);max-width:400px;
    line-height:1.7;margin-bottom:3rem;
  }

  .btn{
    display:inline-flex;align-items:center;gap:.6rem;
    padding:.85rem 2.2rem;border-radius:999px;
    background:linear-gradient(135deg,#c9a84c,#a0803a);
    color:#1a0a00;font-family:'Poppins',sans-serif;
    font-size:.88rem;font-weight:700;letter-spacing:.08em;
    text-decoration:none;text-transform:uppercase;
    transition:all .25s;
    box-shadow:0 8px 30px rgba(201,168,76,.35);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(201,168,76,.5);}
  .btn svg{width:16px;height:16px;}

  .divider{
    width:60px;height:1px;
    background:linear-gradient(90deg,transparent,#c9a84c,transparent);
    margin:0 auto 3rem;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="stars" id="stars"></div>

<div class="container">
  <div class="logo">✦ TROY Perfumes ✦</div>
  <div class="code">404</div>
  <div class="divider"></div>
  <div class="title">Fragrance Not Found</div>
  <p class="sub">The page you're looking for has drifted away like a forgotten scent. Let us guide you back to the collection.</p>
  <a class="btn" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Return to Store
  </a>
</div>

<script>
  var s = document.getElementById('stars');
  for (var i = 0; i < 120; i++) {
    var el = document.createElement('div');
    el.className = 'star';
    var size = (Math.random() * 2.5 + .5).toFixed(1);
    el.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;'
      +'--d:'+(2+Math.random()*4).toFixed(1)+'s;--del:'+(Math.random()*4).toFixed(2)+'s;';
    s.appendChild(el);
  }
</script>
</body>
</html>
